<ng-container *ngIf="dialog$ | async as dialog">
  <div class="preset-dialog__backdrop" role="presentation" (click)="close()"></div>
  <div class="preset-dialog" role="dialog" aria-modal="true" [attr.aria-label]="dialog.title">
    <header class="preset-dialog__header">
      <h3 class="preset-dialog__title">{{ dialog.title }}</h3>
      <button type="button" class="preset-dialog__close" (click)="close()" aria-label="Zamknij">×</button>
    </header>

    <p class="preset-dialog__hint">Skopiuj i wklej JSON do pliku z presetem.</p>

    <textarea class="preset-dialog__textarea" readonly rows="14">{{ dialog.content }}</textarea>

    <div class="preset-dialog__actions">
      <button type="button" class="preset-dialog__button" (click)="copy(dialog.content)">
        Kopiuj JSON
      </button>
      <button type="button" class="preset-dialog__button preset-dialog__button--ghost" (click)="close()">
        Zamknij
      </button>
    </div>
  </div>
</ng-container>
