<div class="projects-dashboard">
  <header class="app-topbar">
    <div class="app-topbar__inner">
      <div class="app-topbar__logo" aria-label="3D Cake Editor logo">🍰</div>
      <div class="app-topbar__spacer"></div>
      <div class="app-topbar__user" *ngIf="isAuthenticated; else loginCta">
        <button
          class="user-avatar"
          type="button"
          (click)="toggleUserMenu()"
          aria-haspopup="true"
          [attr.aria-expanded]="userMenuOpen"
        >
          {{ ((user$ | async)?.email?.charAt(0) || 'U') | uppercase }}
        </button>
        <div class="user-menu" *ngIf="userMenuOpen">
          <div class="user-menu__email">{{ (user$ | async)?.email }}</div>
          <button class="user-menu__item" type="button" (click)="logout()">Wyloguj</button>
        </div>
      </div>
      <ng-template #loginCta>
        <button class="btn btn--primary" type="button" (click)="goToLogin()">Zaloguj</button>
      </ng-template>
    </div>
  </header>

  <section class="projects-toolbar">
    <div class="projects-toolbar__inner">
      <div class="projects-toolbar__title">
        <h1>My projects</h1>
        <p class="projects-toolbar__subtitle">Zarządzaj projektami tortów w jednym miejscu</p>
      </div>

      <div class="projects-toolbar__search">
        <div class="input input--with-icon">
          <input
            type="text"
            placeholder="Type to search"
            aria-label="Search projects"
            [(ngModel)]="searchQuery"
          />
          <span class="icon-20" aria-hidden="true">⌕</span>
        </div>
      </div>

      <div class="projects-toolbar__actions">
        <div class="toggle-view">
          <button
            class="toggle-view__btn"
            type="button"
            [class.toggle-view__btn--active]="viewMode === 'grid'"
            [attr.aria-pressed]="viewMode === 'grid'"
            (click)="setViewMode('grid')"
            title="Widok siatki"
          >
            ▥
          </button>
          <button
            class="toggle-view__btn"
            type="button"
            [class.toggle-view__btn--active]="viewMode === 'list'"
            [attr.aria-pressed]="viewMode === 'list'"
            (click)="setViewMode('list')"
            title="Widok listy"
          >
            ☰
          </button>
        </div>

        <button class="btn btn--ghost" type="button" (click)="loadProjects()">
          <span>Refresh</span>
          <span class="icon-16" aria-hidden="true">⟳</span>
        </button>

        <button class="btn btn--primary" type="button" (click)="createProject()">
          <span class="icon-16" aria-hidden="true">＋</span>
          <span>New</span>
        </button>
      </div>
    </div>
  </section>

  <main class="projects-content">
    <div class="projects-grid" [class.projects-grid--list]="viewMode === 'list'" *ngIf="!loading; else loadingTpl">
      <ng-container *ngIf="filteredProjects.length; else noResultsTpl">
        <article
          class="project-card"
          [class.project-card--list]="viewMode === 'list'"
          *ngFor="let project of filteredProjects"
        >
          <header class="project-card__header">
            <div class="icon-24" aria-hidden="true">📁</div>
            <div class="project-card__meta">
              <div class="project-card__title-row">
                <h2 class="project-card__title" *ngIf="renameProjectId !== project.id; else renameTpl">{{ project.name }}</h2>
                <div class="project-card__subtitle">Ostatnia edycja: {{ project.updatedAt | date: 'short' }}</div>
              </div>
            </div>
          </header>

          <div class="project-card__preview" aria-hidden="true"></div>

          <footer class="project-card__footer" *ngIf="renameProjectId !== project.id; else renameActions">
            <button class="btn btn--ghost btn--small" type="button" (click)="openProject(project.id)">
              <span class="icon-16" aria-hidden="true">↗</span>
              <span>Wybierz</span>
            </button>
            <div class="project-card__actions">
              <button class="btn btn--ghost btn--small" type="button" (click)="startRename(project)">
                Zmień nazwę
              </button>
              <button class="btn btn--primary btn--small" type="button" (click)="deleteProject(project)">
                Usuń
              </button>
            </div>
          </footer>

          <ng-template #renameTpl>
            <div class="rename-row">
              <input [(ngModel)]="renameValue" />
            </div>
          </ng-template>

          <ng-template #renameActions>
            <footer class="project-card__footer">
              <button class="btn btn--ghost btn--small" type="button" (click)="confirmRename(project)">Zapisz</button>
              <button class="btn btn--ghost btn--small" type="button" (click)="cancelRename()">Anuluj</button>
            </footer>
          </ng-template>
        </article>
      </ng-container>

      <ng-template #noResultsTpl>
        <div class="projects-empty">Brak wyników dla "{{ searchQuery }}"</div>
      </ng-template>

      <article class="project-card project-card--new" [class.project-card--list]="viewMode === 'list'">
        <div class="project-card__new">
          <div class="icon-24" aria-hidden="true">＋</div>
          <div class="project-card__meta">
            <h3 class="project-card__title">Nowy projekt</h3>
            <p class="project-card__subtitle">Podaj nazwę i zacznij edytować</p>
          </div>
        </div>
        <div class="project-card__new-form">
          <input
            class="project-card__new-input"
            type="text"
            [(ngModel)]="newProjectName"
            placeholder="Nazwa projektu"
            aria-label="New project name"
          />
          <button class="btn btn--primary" type="button" (click)="createProject()">Utwórz</button>
        </div>
      </article>
    </div>
  </main>
</div>

<ng-template #loadingTpl>
  <div class="projects-loading">Wczytywanie projektów...</div>
</ng-template>
