<section class="sidebar-panel presets-panel">
  <header class="sidebar-panel__header">
    <h3 class="sidebar-panel__title">Gotowe torty</h3>
    <p class="sidebar-panel__subtitle">Wybierz ułożony tort z listy</p>
  </header>

  <div class="sidebar-panel__body">
    <div class="presets-panel__grid" role="list">
      <button
        type="button"
        class="presets-panel__card"
        *ngFor="let preset of presets"
        (click)="onApplyPreset(preset)"
        role="listitem"
      >
        <span class="presets-panel__thumbnail" aria-hidden="true">
          <img
            *ngIf="preset.thumbnailUrl; else fallback"
            [src]="preset.thumbnailUrl"
            [alt]="'Miniatura ' + preset.name"
            loading="lazy"
          />
          <ng-template #fallback>
            <span class="presets-panel__placeholder">{{ preset.name[0] }}</span>
          </ng-template>
        </span>
        <span class="presets-panel__details">
          <span class="presets-panel__name">{{ preset.name }}</span>
          <span class="presets-panel__description" *ngIf="preset.description">{{ preset.description }}</span>
        </span>
      </button>

      <p class="presets-panel__empty" *ngIf="!presets.length">Brak gotowych tortów do wczytania.</p>
    </div>
  </div>
</section>
