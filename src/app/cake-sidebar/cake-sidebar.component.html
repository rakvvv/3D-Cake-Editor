<div class="sidebar">
  <header class="sidebar__header">
    <h2 class="sidebar__title">Edytor tortu</h2>
    <p class="sidebar__subtitle">Konfiguracja, dekoracje i eksport</p>
  </header>

  <nav class="sidebar__nav" aria-label="Sekcje narzędzi">
    <button type="button" class="sidebar__nav-button" (click)="scrollToPanel('layers')">
      Podstawy
    </button>
    <button type="button" class="sidebar__nav-button" (click)="scrollToPanel('decorations')">
      Dekoracje
    </button>
    <button type="button" class="sidebar__nav-button" (click)="scrollToPanel('paint')">
      Malowanie
    </button>
    <button type="button" class="sidebar__nav-button" (click)="scrollToPanel('export')">
      Eksport
    </button>
  </nav>

  <div class="sidebar__content" #scrollContainer tabindex="-1">
    <app-layers-panel
      #layersPanel
      (cakeOptionsChange)="cakeOptionsChange.emit($event)"
    ></app-layers-panel>

    <app-decorations-panel
      #decorationsPanel
      [decorationsService]="decorationsService"
      [validationSummary]="validationSummary"
      [validationIssues]="validationIssues"
      [pendingActionLabel]="pendingValidationLabel"
      (addDecoration)="addDecorationEvent.emit($event)"
      (validateDecorations)="validateDecorations.emit()"
      (transformModeChange)="transformModeChange.emit($event)"
      (proceedDespiteWarnings)="proceedDespiteWarnings.emit()"
    ></app-decorations-panel>

    <app-paint-panel
      #paintPanel
      [paintService]="paintService"
      (paintModeChange)="paintModeChange.emit($event)"
      (brushChange)="brushChange.emit($event)"
    ></app-paint-panel>

    <app-export-panel
      #exportPanel
      (saveScene)="saveSceneEvent.emit()"
      (exportObj)="exportObj.emit()"
      (exportStl)="exportStl.emit()"
      (exportGltf)="exportGltf.emit()"
      (screenshot)="screenshot.emit()"
    ></app-export-panel>
  </div>
</div>
