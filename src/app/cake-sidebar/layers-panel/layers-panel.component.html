<section class="sidebar-panel">
  <header class="sidebar-panel__header">
    <h3 class="sidebar-panel__title">Opcje tortu</h3>
    <p class="sidebar-panel__subtitle">Podstawowe parametry sceny</p>
  </header>
  <div class="sidebar-panel__body sidebar-panel__scroll">
    <div class="sidebar-panel__control sidebar-panel__control--range">
      <label class="sidebar-panel__label sidebar-panel__label--wrap" for="cake-size">
        Rozmiar tortu
        <span class="sidebar-panel__value">{{ cakeSize | number:'1.0-1' }}</span>
      </label>
      <input
        id="cake-size"
        class="sidebar-panel__range"
        type="range"
        min="1"
        max="2"
        step="0.1"
        [(ngModel)]="cakeSize"
        (change)="updateCakeOptions()"
      />
    </div>

    <div class="sidebar-panel__control sidebar-panel__control--inline">
      <label class="sidebar-panel__label sidebar-panel__label--wrap" for="cake-color">Kolor tortu</label>
      <input
        id="cake-color"
        class="sidebar-panel__input"
        type="color"
        [(ngModel)]="cakeColor"
        (change)="updateCakeOptions()"
      />
    </div>

    <div class="sidebar-panel__control sidebar-panel__control--toggle">
      <label class="sidebar-panel__checkbox" for="cake-glaze-enabled">
        <input
          id="cake-glaze-enabled"
          type="checkbox"
          [(ngModel)]="glazeEnabled"
          (ngModelChange)="updateCakeOptions()"
        />
        Polewa na wierzchu
      </label>
    </div>

    <div class="sidebar-panel__control sidebar-panel__control--inline">
      <label class="sidebar-panel__label sidebar-panel__label--wrap" for="cake-glaze-color">Kolor polewy</label>
      <input
        id="cake-glaze-color"
        class="sidebar-panel__input"
        type="color"
        [(ngModel)]="glazeColor"
        (change)="updateCakeOptions()"
        [disabled]="!glazeEnabled"
      />
    </div>

    <div class="sidebar-panel__control sidebar-panel__control--inline">
      <label class="sidebar-panel__label sidebar-panel__label--wrap" for="cake-glaze-seed">Seed polewy</label>
      <input
        id="cake-glaze-seed"
        class="sidebar-panel__input"
        type="number"
        min="0"
        step="1"
        [(ngModel)]="glazeSeed"
        (ngModelChange)="updateCakeOptions()"
        [disabled]="!glazeEnabled"
      />
    </div>

    <div class="sidebar-panel__control sidebar-panel__control--inline">
      <label class="sidebar-panel__label sidebar-panel__label--wrap" for="cake-wafer">Obraz opłatka</label>
      <div class="sidebar-panel__control-file">
        <input
          id="cake-wafer"
          class="sidebar-panel__input"
          type="file"
          accept="image/png,image/jpeg,image/webp"
          (change)="onWaferFileSelected($event)"
          data-testid="wafer-upload"
        />
        <span class="sidebar-panel__hint">PNG/JPG/WebP, maks. 5 MB.</span>
      </div>
      <div *ngIf="waferError" class="sidebar-panel__message sidebar-panel__message--warning">
        {{ waferError }}
      </div>
      <div *ngIf="waferTextureUrl" class="sidebar-panel__wafer-actions">
        <button class="sidebar-panel__button" type="button" (click)="openWaferEditor()" data-testid="wafer-open-editor">
          Dopasuj opłatek
        </button>
        <span class="sidebar-panel__hint">Przeciągnij i przybliż w podglądzie.</span>
      </div>
    </div>

    <div class="sidebar-panel__control sidebar-panel__control--range">
      <label class="sidebar-panel__label sidebar-panel__label--wrap" for="wafer-scale">
        Skala opłatka
        <span class="sidebar-panel__value">{{ waferScale | number: '1.1-2' }}x</span>
      </label>
      <input
        id="wafer-scale"
        class="sidebar-panel__range"
        type="range"
        [min]="waferScaleMin"
        [max]="waferScaleMax"
        step="0.05"
        [(ngModel)]="waferScale"
        (ngModelChange)="updateCakeOptions()"
        [disabled]="!waferTextureUrl"
      />
    </div>

    <div class="sidebar-panel__control sidebar-panel__control--range">
      <label class="sidebar-panel__label sidebar-panel__label--wrap" for="cake-layers">
        Liczba pięter
        <span class="sidebar-panel__value">{{ cakeLayers }}</span>
      </label>
      <input
        id="cake-layers"
        class="sidebar-panel__range"
        type="range"
        min="1"
        max="5"
        step="1"
        [ngModel]="cakeLayers"
        (ngModelChange)="onLayersChanged($event)"
      />
    </div>

    <div
      class="sidebar-panel__control sidebar-panel__control--range"
      *ngFor="let size of cakeLayerSizes; let index = index"
    >
      <label
        class="sidebar-panel__label sidebar-panel__label--wrap"
        [attr.for]="'layer-size-' + index"
      >
        Szerokość piętra {{ index + 1 }}
        <span class="sidebar-panel__value">{{ size | number: '1.2-2' }}x</span>
      </label>
      <input
        class="sidebar-panel__range"
        type="range"
        [id]="'layer-size-' + index"
        [min]="minLayerSize"
        [max]="maxLayerSize"
        step="0.05"
        [ngModel]="size"
        (ngModelChange)="onLayerSizeChanged(index, $event)"
      />
    </div>

    <div class="sidebar-panel__control sidebar-panel__control--inline">
      <label class="sidebar-panel__label sidebar-panel__label--wrap" for="cake-shape">Kształt tortu</label>
      <select
        id="cake-shape"
        class="sidebar-panel__select"
        [(ngModel)]="cakeShape"
        (change)="updateCakeOptions()"
      >
        <option value="cylinder">Okrągły</option>
        <option value="cuboid">Prostokątny</option>
      </select>
    </div>

    <div class="sidebar-panel__control sidebar-panel__control--toggle">
      <label class="sidebar-panel__checkbox" for="cake-text">
        <input id="cake-text" type="checkbox" [(ngModel)]="cakeText" (change)="updateCakeOptions()" />
        Włącz napis
      </label>
    </div>

    <div class="sidebar-panel__control sidebar-panel__control--inline">
      <label class="sidebar-panel__label sidebar-panel__label--wrap" for="cake-text-value">Tekst napisu</label>
      <textarea
        id="cake-text-value"
        class="sidebar-panel__input sidebar-panel__textarea"
        rows="3"
        [(ngModel)]="cakeTextValue"
        (ngModelChange)="updateCakeOptions()"
        [disabled]="!cakeText"
      placeholder="Np. Ola&#10;20 lat"
      ></textarea>
    </div>

    <ng-container *ngIf="cakeText">
      <div class="sidebar-panel__control sidebar-panel__control--inline">
        <label class="sidebar-panel__label sidebar-panel__label--wrap" for="cake-text-position">Pozycja napisu</label>
        <select
          id="cake-text-position"
          class="sidebar-panel__select"
          [(ngModel)]="cakeTextPosition"
          (ngModelChange)="updateCakeOptions()"
        >
          <option value="top">Góra tortu</option>
          <option value="side">Bok tortu</option>
        </select>
      </div>

      <div class="sidebar-panel__control sidebar-panel__control--range">
        <label class="sidebar-panel__label sidebar-panel__label--wrap" for="cake-text-offset">
          Wysunięcie napisu
          <span class="sidebar-panel__value">{{ cakeTextOffset | number: '1.2-2' }}x</span>
        </label>
        <input
          id="cake-text-offset"
          class="sidebar-panel__range"
          type="range"
          min="-0.5"
          max="0.5"
          step="0.05"
          [(ngModel)]="cakeTextOffset"
          (ngModelChange)="updateCakeOptions()"
        />
      </div>

      <div class="sidebar-panel__control sidebar-panel__control--range">
        <label class="sidebar-panel__label sidebar-panel__label--wrap" for="cake-text-depth">
          Grubość napisu
          <span class="sidebar-panel__value">{{ cakeTextDepth | number: '1.2-2' }}x</span>
        </label>
        <input
          id="cake-text-depth"
          class="sidebar-panel__range"
          type="range"
          min="0.05"
          max="0.25"
          step="0.01"
          [(ngModel)]="cakeTextDepth"
          (ngModelChange)="updateCakeOptions()"
        />
      </div>

      <div class="sidebar-panel__control sidebar-panel__control--inline">
        <label class="sidebar-panel__label sidebar-panel__label--wrap" for="cake-text-font">Font napisu</label>
        <select
          id="cake-text-font"
          class="sidebar-panel__select"
          [(ngModel)]="cakeTextFont"
          (ngModelChange)="updateCakeOptions()"
        >
          <option *ngFor="let font of availableFonts" [value]="font.value">{{ font.label }}</option>
        </select>
      </div>
    </ng-container>
  </div>
</section>

<div class="wafer-editor" *ngIf="waferEditorOpen" data-testid="wafer-editor">
  <div class="wafer-editor__backdrop" (click)="closeWaferEditor()"></div>
  <div class="wafer-editor__dialog" role="dialog" aria-modal="true">
    <header class="wafer-editor__header">
      <h4>Dopasuj opłatek</h4>
      <p>Przesuń i przybliż obraz, aby wypełnić górę tortu.</p>
    </header>
    <div class="wafer-editor__viewport-wrapper">
      <div
        #waferViewport
        class="wafer-editor__viewport"
        [class.wafer-editor__viewport--circle]="cakeShape === 'cylinder'"
        [class.wafer-editor__viewport--rect]="cakeShape === 'cuboid'"
        (pointerdown)="onWaferPointerDown($event)"
        (pointermove)="onWaferPointerMove($event)"
        (pointerup)="onWaferPointerUp($event)"
        (pointercancel)="onWaferPointerUp($event)"
        (contextmenu)="$event.preventDefault()"
      >
        <div
          *ngIf="waferTextureUrl"
          class="wafer-editor__image"
          role="img"
          aria-label="Podgląd opłatka"
          [ngStyle]="waferPreviewStyle"
        ></div>
      </div>
    </div>
    <div class="wafer-editor__controls">
      <label class="sidebar-panel__label sidebar-panel__label--wrap" for="wafer-zoom">
        Powiększenie zdjęcia
        <span class="sidebar-panel__value">{{ waferTextureZoom | number: '1.1-2' }}x</span>
      </label>
      <input
        id="wafer-zoom"
        class="sidebar-panel__range wafer-editor__range"
        type="range"
        [min]="waferZoomMin"
        [max]="waferZoomMax"
        step="0.05"
        [(ngModel)]="waferTextureZoom"
        (ngModelChange)="onWaferZoomChanged($event)"
      />
    </div>
    <footer class="wafer-editor__footer">
      <button type="button" class="sidebar-panel__button sidebar-panel__button--ghost" (click)="closeWaferEditor()">
        Anuluj
      </button>
      <button type="button" class="sidebar-panel__button" (click)="confirmWaferEditor()">
        Zapisz podgląd
      </button>
    </footer>
  </div>
</div>
