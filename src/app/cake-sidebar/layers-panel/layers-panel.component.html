<section class="sidebar-panel">
  <header class="sidebar-panel__header">
    <h3 class="sidebar-panel__title">Opcje tortu</h3>
    <p class="sidebar-panel__subtitle">Podstawowe parametry sceny</p>
  </header>
  <div class="sidebar-panel__body">
    <div class="sidebar-panel__control sidebar-panel__control--range">
      <label class="sidebar-panel__label sidebar-panel__label--wrap" for="cake-size">
        Rozmiar tortu
        <span class="sidebar-panel__value">{{ cakeSize | number:'1.0-1' }}</span>
      </label>
      <input
        id="cake-size"
        class="sidebar-panel__range"
        type="range"
        min="1"
        max="2"
        step="0.1"
        [(ngModel)]="cakeSize"
        (change)="updateCakeOptions()"
      />
    </div>

    <div class="sidebar-panel__control sidebar-panel__control--inline">
      <label class="sidebar-panel__label sidebar-panel__label--wrap" for="cake-color">Kolor tortu</label>
      <input
        id="cake-color"
        class="sidebar-panel__input"
        type="color"
        [(ngModel)]="cakeColor"
        (change)="updateCakeOptions()"
      />
    </div>

    <div class="sidebar-panel__control sidebar-panel__control--range">
      <label class="sidebar-panel__label sidebar-panel__label--wrap" for="cake-layers">
        Liczba pięter
        <span class="sidebar-panel__value">{{ cakeLayers }}</span>
      </label>
      <input
        id="cake-layers"
        class="sidebar-panel__range"
        type="range"
        min="1"
        max="5"
        step="1"
        [ngModel]="cakeLayers"
        (ngModelChange)="onLayersChanged($event)"
      />
    </div>

    <div
      class="sidebar-panel__control sidebar-panel__control--range"
      *ngFor="let size of cakeLayerSizes; let index = index"
    >
      <label
        class="sidebar-panel__label sidebar-panel__label--wrap"
        [attr.for]="'layer-size-' + index"
      >
        Szerokość piętra {{ index + 1 }}
        <span class="sidebar-panel__value">{{ size | number: '1.2-2' }}x</span>
      </label>
      <input
        class="sidebar-panel__range"
        type="range"
        [id]="'layer-size-' + index"
        [min]="minLayerSize"
        [max]="maxLayerSize"
        step="0.05"
        [ngModel]="size"
        (ngModelChange)="onLayerSizeChanged(index, $event)"
      />
    </div>

    <div class="sidebar-panel__control sidebar-panel__control--inline">
      <label class="sidebar-panel__label sidebar-panel__label--wrap" for="cake-shape">Kształt tortu</label>
      <select
        id="cake-shape"
        class="sidebar-panel__select"
        [(ngModel)]="cakeShape"
        (change)="updateCakeOptions()"
      >
        <option value="cylinder">Okrągły</option>
        <option value="cuboid">Prostokątny</option>
      </select>
    </div>

    <div class="sidebar-panel__control sidebar-panel__control--toggle">
      <label class="sidebar-panel__checkbox" for="cake-text">
        <input id="cake-text" type="checkbox" [(ngModel)]="cakeText" (change)="updateCakeOptions()" />
        Włącz napis
      </label>
    </div>

    <div class="sidebar-panel__control sidebar-panel__control--inline">
      <label class="sidebar-panel__label sidebar-panel__label--wrap" for="cake-text-value">Tekst napisu</label>
      <textarea
        id="cake-text-value"
        class="sidebar-panel__input sidebar-panel__textarea"
        rows="3"
        [(ngModel)]="cakeTextValue"
        (ngModelChange)="updateCakeOptions()"
        [disabled]="!cakeText"
      placeholder="Np. Ola&#10;20 lat"
      ></textarea>
    </div>

    <ng-container *ngIf="cakeText">
      <div class="sidebar-panel__control sidebar-panel__control--inline">
        <label class="sidebar-panel__label sidebar-panel__label--wrap" for="cake-text-position">Pozycja napisu</label>
        <select
          id="cake-text-position"
          class="sidebar-panel__select"
          [(ngModel)]="cakeTextPosition"
          (ngModelChange)="updateCakeOptions()"
        >
          <option value="top">Góra tortu</option>
          <option value="side">Bok tortu</option>
        </select>
      </div>

      <div class="sidebar-panel__control sidebar-panel__control--range">
        <label class="sidebar-panel__label sidebar-panel__label--wrap" for="cake-text-offset">
          Offset napisu
          <span class="sidebar-panel__value">{{ cakeTextOffset | number: '1.1-2' }}</span>
        </label>
        <input
          id="cake-text-offset"
          class="sidebar-panel__range"
          type="range"
          min="-0.5"
          max="0.5"
          step="0.05"
          [(ngModel)]="cakeTextOffset"
          (ngModelChange)="updateCakeOptions()"
        />
      </div>

      <div class="sidebar-panel__control sidebar-panel__control--range">
        <label class="sidebar-panel__label sidebar-panel__label--wrap" for="cake-text-depth">
          Wysokość liter
          <span class="sidebar-panel__value">{{ cakeTextDepth | number: '1.1-2' }}</span>
        </label>
        <input
          id="cake-text-depth"
          class="sidebar-panel__range"
          type="range"
          min="0.01"
          max="0.35"
          step="0.005"
          [(ngModel)]="cakeTextDepth"
          (ngModelChange)="updateCakeOptions()"
        />
      </div>

      <div class="sidebar-panel__control sidebar-panel__control--inline">
        <label class="sidebar-panel__label sidebar-panel__label--wrap" for="cake-text-font">Czcionka</label>
        <select
          id="cake-text-font"
          class="sidebar-panel__select"
          [(ngModel)]="cakeTextFont"
          (ngModelChange)="updateCakeOptions()"
        >
          <option *ngFor="let font of availableFonts" [ngValue]="font.value">{{ font.label }}</option>
        </select>
      </div>
    </ng-container>
  </div>
</section>
