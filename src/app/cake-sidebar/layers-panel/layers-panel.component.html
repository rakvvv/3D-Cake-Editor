<section class="panel">
  <h3>Opcje tortu</h3>
  <div class="option-group">
    <label>Rozmiar tortu: {{ cakeSize | number:'1.0-1' }}</label>
    <input
      type="range"
      min="1"
      max="2"
      step="0.1"
      [(ngModel)]="cakeSize"
      (change)="updateCakeOptions()"
    />
  </div>
  <div class="option-group">
    <label>Kolor tortu:</label>
    <input type="color" [(ngModel)]="cakeColor" (change)="updateCakeOptions()" />
  </div>
  <div class="option-group">
    <label>
      <input type="checkbox" [(ngModel)]="cakeText" (change)="updateCakeOptions()" />
      Włącz napis
    </label>
  </div>
  <div class="option-group">
    <label>Tekst napisu:</label>
    <input
      type="text"
      [(ngModel)]="cakeTextValue"
      (change)="updateCakeOptions()"
      [disabled]="!cakeText"
    />
  </div>
</section>
