<section class="sidebar-panel paint-panel">
  <header class="sidebar-panel__header">
    <h3 class="sidebar-panel__title">Narzędzie malowania</h3>
    <p class="sidebar-panel__subtitle">Steruj trybem i parametrami pędzla</p>
  </header>
  <div class="sidebar-panel__body">
    <div class="sidebar-panel__control sidebar-panel__control--inline">
      <label class="sidebar-panel__label sidebar-panel__label--wrap" for="tool-select">Tryb malowania</label>
      <select
        id="tool-select"
        class="sidebar-panel__select"
        [(ngModel)]="selectedTool"
        (change)="onToolChange()"
        [disabled]="eraserMode"
      >
        <option *ngFor="let tool of paintTools" [value]="tool.id">
          {{ tool.name }}
        </option>
      </select>
    </div>

    <div class="sidebar-panel__control sidebar-panel__control--inline paint-panel__eraser">
      <button
        type="button"
        class="sidebar-panel__button paint-panel__eraser-button"
        [class.paint-panel__eraser-button--active]="eraserMode"
        (click)="toggleEraserMode()"
        [attr.aria-pressed]="eraserMode"
        data-testid="eraser-toggle"
      >
        {{ eraserMode ? 'Wyłącz gumkę' : 'Włącz gumkę' }}
      </button>
    </div>

    <div class="sidebar-panel__control sidebar-panel__control--inline" *ngIf="!eraserMode && selectedTool === 'decoration'">
      <label class="sidebar-panel__label sidebar-panel__label--wrap" for="brush-select">Wybierz pędzel</label>
      <select
        id="brush-select"
        class="sidebar-panel__select"
        [(ngModel)]="selectedBrush"
        (change)="onBrushChange()"
      >
        <option *ngFor="let brush of brushList" [value]="brush.id">
          {{ brush.name }}
        </option>
      </select>
    </div>

    <div class="paint-panel__pen-settings" *ngIf="!eraserMode && selectedTool === 'pen'">
      <div class="sidebar-panel__control sidebar-panel__control--inline">
        <label class="sidebar-panel__label sidebar-panel__label--wrap" for="pen-size">Rozmiar końcówki (m)</label>
        <input
          id="pen-size"
          class="sidebar-panel__input"
          type="number"
          step="0.01"
          min="0.01"
          [(ngModel)]="penSize"
          (change)="onPenSettingsChange()"
        />
      </div>
      <p class="paint-panel__hint">
        Zmienia tylko zaokrąglenie końcówek, linia zachowuje ustawioną grubość.
      </p>
      <div class="sidebar-panel__control sidebar-panel__control--inline">
        <label class="sidebar-panel__label sidebar-panel__label--wrap" for="pen-thickness">Grubość linii (m)</label>
        <input
          id="pen-thickness"
          class="sidebar-panel__input"
          type="number"
          step="0.01"
          min="0.005"
          [(ngModel)]="penThickness"
          (change)="onPenSettingsChange()"
        />
      </div>
      <div class="sidebar-panel__control sidebar-panel__control--inline">
        <label class="sidebar-panel__label sidebar-panel__label--wrap" for="pen-color">Kolor</label>
        <input
          id="pen-color"
          class="sidebar-panel__input paint-panel__color"
          type="color"
          [(ngModel)]="penColor"
          (change)="onPenSettingsChange()"
        />
      </div>
    </div>

    <button type="button" class="sidebar-panel__button paint-panel__toggle" (click)="togglePaintMode()">
      {{ paintService.paintMode ? 'Wyłącz rysowanie' : 'Włącz rysowanie' }}
    </button>
    <div class="sidebar-panel__actions sidebar-panel__actions--compact paint-panel__actions">
      <button type="button" class="sidebar-panel__button" (click)="undoLast()" [disabled]="!canUndo()">
        Cofnij (Ctrl+Z)
      </button>
      <button type="button" class="sidebar-panel__button" (click)="redoLast()" [disabled]="!canRedo()">
        Przywróć (Ctrl+Y)
      </button>
    </div>
  </div>
</section>
