<section class="sidebar-panel export-panel">
  <header class="sidebar-panel__header">
    <h3 class="sidebar-panel__title">Eksport</h3>
    <p class="sidebar-panel__subtitle">Zapisuj i udostępniaj projekt tortu</p>
  </header>
  <div class="sidebar-panel__body">
    <div class="sidebar-panel__actions">
      <button type="button" class="sidebar-panel__button" (click)="onSaveScene()">Zapisz scenę</button>
      <button type="button" class="sidebar-panel__button" (click)="onExportObj()">Eksport OBJ</button>
      <button type="button" class="sidebar-panel__button" (click)="onExportStl()">Eksport STL</button>
      <button type="button" class="sidebar-panel__button" (click)="onExportGltf()">Eksport GLTF</button>
      <button type="button" class="sidebar-panel__button" (click)="onScreenshot()">Screenshot</button>
    </div>
  </div>
</section>
