<section class="panel">
  <h3>Dekoracje</h3>
  <div class="filters">
    <input
      type="search"
      placeholder="Szukaj dekoracji"
      [(ngModel)]="filterText"
    />
    <select [(ngModel)]="filterType">
      <option value="ALL">Wszystkie</option>
      <option value="TOP">Górne</option>
      <option value="SIDE">Boczne</option>
      <option value="BOTH">Uniwersalne</option>
    </select>
  </div>
  <div class="decorations-list">
    <div
      class="decoration-card"
      *ngFor="let decoration of filteredDecorations"
      (click)="onAddDecoration(decoration.modelFileName)"
    >
      <div class="thumbnail" aria-hidden="true">{{ decoration.name[0] }}</div>
      <div class="details">
        <span class="name">{{ decoration.name }}</span>
        <span class="type">{{ displayTypeLabel(decoration.type) }}</span>
      </div>
    </div>
  </div>
  <div class="actions">
    <button type="button" (click)="onValidateDecorations()">Sprawdź dekoracje</button>
    <div class="transform-group">
      <button type="button" (click)="setTransformMode('translate')">Przesuń</button>
      <button type="button" (click)="setTransformMode('rotate')">Obróć</button>
      <button type="button" (click)="setTransformMode('scale')">Skaluj</button>
    </div>
  </div>

  <div class="validation-results" *ngIf="validationSummary as summary">
    <p class="message" [class.message--warning]="hasValidationIssues" [class.message--success]="!hasValidationIssues">
      {{ summary }}
    </p>
    <button
      type="button"
      *ngIf="hasValidationIssues && pendingActionLabel"
      class="override-button"
      (click)="proceedDespiteWarnings.emit()"
    >
      Kontynuuj: {{ pendingActionLabel }}
    </button>
  </div>
</section>
