<section class="sidebar-panel decorations-panel">
  <header class="sidebar-panel__header">
    <h3 class="sidebar-panel__title">Dekoracje</h3>
    <p class="sidebar-panel__subtitle">Dodaj elementy na tort</p>
  </header>
  <div class="sidebar-panel__body">
    <div class="decorations-panel__filters">
      <input
        class="sidebar-panel__input decorations-panel__search"
        type="search"
        placeholder="Szukaj dekoracji"
        [(ngModel)]="filterText"
      />
      <select class="sidebar-panel__select decorations-panel__type" [(ngModel)]="filterType">
        <option value="ALL">Wszystkie</option>
        <option value="TOP">Górne</option>
        <option value="SIDE">Boczne</option>
        <option value="BOTH">Uniwersalne</option>
      </select>
    </div>

    <div class="decorations-panel__placement">
      <label class="decorations-panel__placement-row">
        <span class="decorations-panel__placement-label">Powierzchnia</span>
        <select class="sidebar-panel__select" [(ngModel)]="placementSurface">
          <option value="AUTO">{{ surfaceLabel('AUTO') }}</option>
          <option value="TOP">{{ surfaceLabel('TOP') }}</option>
          <option value="SIDE">{{ surfaceLabel('SIDE') }}</option>
        </select>
      </label>

      <label class="decorations-panel__placement-row" *ngIf="layerOptions.length > 1">
        <span class="decorations-panel__placement-label">Piętro</span>
        <select class="sidebar-panel__select" [(ngModel)]="targetLayerIndex">
          <option *ngFor="let layer of layerOptions" [ngValue]="layer">
            {{ layerLabel(layer) }}
          </option>
        </select>
      </label>
    </div>

    <div class="decorations-panel__anchors">
      <label class="decorations-panel__anchors-toggle">
        <input type="checkbox" [ngModel]="anchorsEnabled" (ngModelChange)="onToggleAnchors($event)" />
        <span>Pokaż kotwice dekoracji</span>
      </label>

      <div class="decorations-panel__anchors-body" *ngIf="anchorsEnabled">
        <label class="decorations-panel__anchors-row">
          <span class="decorations-panel__placement-label">Preset</span>
          <select
            class="sidebar-panel__select"
            [ngModel]="activeAnchorPresetId"
            (ngModelChange)="onAnchorPresetChange($event)"
          >
            <option *ngFor="let preset of anchorPresets" [ngValue]="preset.id">{{ preset.name }}</option>
          </select>
        </label>

        <div class="decorations-panel__anchor-modes" role="group" aria-label="Tryb użycia kotwic">
          <label class="decorations-panel__anchor-mode">
            <input
              type="radio"
              name="anchorMode"
              value="spawn"
              [ngModel]="anchorMode"
              (ngModelChange)="onAnchorModeChange($event)"
            />
            Dodawanie dekoracji
          </label>
          <label class="decorations-panel__anchor-mode">
            <input
              type="radio"
              name="anchorMode"
              value="move"
              [ngModel]="anchorMode"
              (ngModelChange)="onAnchorModeChange($event)"
            />
            Przenoszenie zaznaczonej
          </label>
        </div>

        <p class="decorations-panel__hint" *ngIf="anchorInstruction">{{ anchorInstruction }}</p>
      </div>
    </div>

    <div class="decorations-panel__list-container">
      <div class="decorations-panel__list" role="list">
        <button
          type="button"
          class="decorations-panel__card"
          *ngFor="let decoration of filteredDecorations"
          (click)="onAddDecoration(decoration)"
        >
          <span class="decorations-panel__thumbnail" aria-hidden="true">
            <img
              *ngIf="decoration.thumbnailUrl; else letterThumbnail"
              [src]="decoration.thumbnailUrl"
              [alt]="'Miniatura dekoracji ' + decoration.name"
              loading="lazy"
            />
            <ng-template #letterThumbnail>{{ decoration.name[0] }}</ng-template>
          </span>
          <span class="decorations-panel__details">
            <span class="decorations-panel__name">{{ decoration.name }}</span>
            <span class="decorations-panel__type">{{ displayTypeLabel(decoration.type) }}</span>
          </span>
        </button>
      </div>
    </div>

    <div class="decorations-panel__actions">
      <button type="button" class="sidebar-panel__button" (click)="onValidateDecorations()">
        Sprawdź dekoracje
      </button>
      <div class="sidebar-panel__actions sidebar-panel__actions--compact">
        <button type="button" class="sidebar-panel__button" (click)="setTransformMode('translate')">
          Przesuń
        </button>
        <button type="button" class="sidebar-panel__button" (click)="setTransformMode('rotate')">
          Obróć
        </button>
        <button type="button" class="sidebar-panel__button" (click)="setTransformMode('scale')">
          Skaluj
        </button>
      </div>
    </div>

    <div class="decorations-panel__validation" *ngIf="validationSummary as summary">
      <p
        class="sidebar-panel__message"
        [class.sidebar-panel__message--warning]="hasValidationIssues"
        [class.sidebar-panel__message--success]="!hasValidationIssues"
      >
        {{ summary }}
      </p>
      <button
        type="button"
        *ngIf="hasValidationIssues && pendingActionLabel"
        class="sidebar-panel__button decorations-panel__override"
        (click)="proceedDespiteWarnings.emit()"
      >
        Kontynuuj: {{ pendingActionLabel }}
      </button>
    </div>

    <p class="decorations-panel__hint" *ngIf="!adminMode">
      Tryb administratora (eksport kotwic) włączysz, dodając <code>?admin=1</code> do adresu strony.
    </p>

    <div class="decorations-panel__admin" *ngIf="adminMode">
      <h4 class="decorations-panel__admin-title">Tryb administratora</h4>
      <p class="decorations-panel__hint">Eksport kotwic działa dla zaznaczonych, przypiętych dekoracji.</p>
      <button type="button" class="sidebar-panel__button" (click)="onExportAnchors()">
        Eksportuj kotwicę z zaznaczenia
      </button>
      <textarea
        class="decorations-panel__admin-output"
        readonly
        rows="6"
        placeholder="Brak danych – zaznacz przypiętą dekorację i kliknij eksport."
        [value]="anchorExportJson"
      ></textarea>
    </div>
  </div>
</section>
