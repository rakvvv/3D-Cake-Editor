<div class="cake-editor">
  <header class="app-topbar">
    <div class="app-topbar__inner">
      <div class="app-topbar__logo" aria-label="3D Cake Editor">🍰</div>
      <div class="app-topbar__spacer"></div>
      <button class="btn btn--ghost" type="button" (click)="goToProjects()">
        <span class="icon-16" aria-hidden="true">←</span>
        <span>My projects</span>
      </button>
    </div>
  </header>

  <section class="editor-toolbar">
    <div class="editor-toolbar__inner">
      <div class="editor-toolbar__left">
        <button class="icon-button" type="button" (click)="goToProjects()">
          <span class="icon-16" aria-hidden="true">←</span>
          <span>Back</span>
        </button>
        <div class="workspace-toolbar__title">
          <span class="workspace-toolbar__label">Tort</span>
          <span class="workspace-toolbar__name">{{ projectName || 'UNTITLED' }}</span>
        </div>
      </div>

      <div class="editor-toolbar__right">
        <button class="btn btn--ghost icon-only" type="button" (click)="onToolbarResetCamera()" title="Resetuj widok">
          <span class="icon-16" aria-hidden="true">⟳</span>
        </button>
        <button class="btn btn--ghost icon-only" type="button" title="Cofnij">
          <span class="icon-16" aria-hidden="true">↶</span>
        </button>
        <button class="btn btn--ghost icon-only" type="button" title="Ponów">
          <span class="icon-16" aria-hidden="true">↷</span>
        </button>
        <ng-container *ngIf="mode === 'setup'; else saveActions">
          <button class="btn btn--primary" type="button" (click)="continueToWorkspace()">
            <span class="icon-16" aria-hidden="true">✔</span>
            <span>Kontynuuj</span>
          </button>
        </ng-container>
        <ng-template #saveActions>
          <button class="btn btn--primary" type="button" (click)="onSaveScene()">
            <span class="icon-16" aria-hidden="true">💾</span>
            <span>Zapisz</span>
          </button>
        </ng-template>
      </div>
    </div>
  </section>

  <ng-container *ngIf="!loadingProject && !loadError; else loadingOrError">
    <app-editor-setup-panel
      *ngIf="mode === 'setup'"
      [options]="options"
      [setupTab]="setupTab"
      [selectedCakeSize]="selectedCakeSize"
      [selectedShape]="selectedShape"
      [selectedLayers]="selectedLayers"
      [selectedTextureId]="selectedTextureId"
      [gradientEnabled]="gradientEnabled"
      [gradientDirection]="gradientDirection"
      [primaryColor]="primaryColor"
      [gradientFirst]="gradientFirst"
      [gradientSecond]="gradientSecond"
      [glazeMode]="glazeMode"
      [glazeEnabled]="glazeEnabled"
      [waferEnabled]="waferEnabled"
      [waferZoom]="waferZoom"
      [waferScale]="waferScale"
      [waferOffsetX]="waferOffsetX"
      [waferOffsetY]="waferOffsetY"
      [setupTextures]="setupTextures"
      (setupTabChange)="selectSetupTab($event)"
      (cakeSizeChange)="selectCakeSize($event)"
      (shapeChange)="selectShape($event)"
      (layersChange)="selectLayers($event)"
      (textureChange)="selectTexture($event)"
      (cakeColorChange)="setCakeColor($event)"
      (gradientToggle)="toggleGradient($event)"
      (gradientColorChange)="setGradientColor($event.which, $event.color)"
      (gradientDirectionChange)="setGradientDirection($event)"
      (glazeToggle)="toggleGlaze($event)"
      (glazeModeChange)="setGlazeMode($event)"
      (glazeColorChange)="setGlazeColor($event)"
      (waferToggle)="toggleWafer($event)"
      (waferColorChange)="setWaferColor($event)"
      (waferScaleChange)="setWaferScale($event)"
      (waferZoomChange)="setWaferZoom($event)"
      (waferOffsetChange)="setWaferOffset($event.axis, $event.value)"
      (waferFileSelected)="onWaferFileSelected($event)"
      (continue)="continueToWorkspace()"
      (canvasReady)="onCanvasReady($event)"
    ></app-editor-setup-panel>

    <app-editor-workspace
      *ngIf="mode === 'workspace'"
      [options]="options"
      [validationSummary]="validationSummary"
      [validationIssues]="validationIssues"
      [pendingValidationLabel]="pendingValidationLabel"
      [authorModeEnabled]="authorModeEnabled"
      (optionsChange)="updateCakeOptions($event)"
      (addDecoration)="onAddDecoration($event)"
      (saveScene)="onSaveScene()"
      (validateDecorations)="onValidateDecorations()"
      (transformModeChange)="onTransformModeChange($event)"
      (paintModeChange)="onTogglePaintMode($event)"
      (brushChange)="onBrushChanged($event)"
      (exportObj)="onExportObj()"
      (exportStl)="onExportStl()"
      (exportGltf)="onExportGltf()"
      (screenshot)="onScreenshot()"
      (proceedDespiteWarnings)="onProceedDespiteWarnings()"
      (applyCakePreset)="onApplyCakePreset($event)"
      (canvasReady)="onCanvasReady($event)"
    ></app-editor-workspace>
  </ng-container>

  <ng-template #loadingOrError>
    <div class="editor-loader" *ngIf="loadingProject">Wczytywanie projektu...</div>
    <div class="editor-error" *ngIf="!loadingProject && loadError">{{ loadError }}</div>
  </ng-template>
</div>
