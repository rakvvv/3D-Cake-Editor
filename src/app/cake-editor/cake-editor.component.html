<div class="cake-editor" [ngClass]="{ 'cake-editor--workspace': mode === 'workspace' }">
  <header class="app-topbar">
    <div class="app-topbar__inner">
      <div class="app-topbar__logo" aria-label="3D Cake Editor">
        <span class="icon icon-24 icon--logo" aria-hidden="true"></span>
      </div>
      <div class="app-topbar__spacer"></div>
      <button class="btn btn--ghost" type="button" (click)="goToProjects()">
        <span class="icon icon-16 icon--arrow-left" aria-hidden="true"></span>
        <span>My projects</span>
      </button>
    </div>
  </header>

  <section class="editor-toolbar">
    <div class="editor-toolbar__inner">
      <div class="editor-toolbar__left">
        <button class="icon-button" type="button" (click)="goToProjects()">
          <span class="icon icon-16 icon--arrow-left" aria-hidden="true"></span>
          <span>Back</span>
        </button>
        <div class="workspace-toolbar__title">
          <span class="workspace-toolbar__label">Project</span>
          <span class="workspace-toolbar__name">{{ projectName || 'UNTITLED' }}</span>
        </div>

        <div class="workspace-toolbar__tabs">
          <div class="toggle-tab">
            <button
              class="toggle-tab__item"
              [class.toggle-tab__item--active]="workspaceTab === 'decor'"
              type="button"
              (click)="selectWorkspaceTab('decor')"
            >
              Decor
            </button>
            <button
              class="toggle-tab__item"
              [class.toggle-tab__item--active]="workspaceTab === 'made'"
              type="button"
              (click)="selectWorkspaceTab('made')"
            >
              Made cakes
            </button>
          </div>
        </div>
      </div>

      <div class="editor-toolbar__right">
        <button class="btn btn--ghost icon-only" type="button" (click)="onToolbarResetCamera()" title="Resetuj widok">
          <span class="icon icon-16 icon--undo" aria-hidden="true"></span>
        </button>
        <button class="btn btn--ghost icon-only" type="button" title="Cofnij">
          <span class="icon icon-16 icon--undo" aria-hidden="true"></span>
        </button>
        <button class="btn btn--ghost icon-only" type="button" title="Ponów">
          <span class="icon icon-16 icon--redo" aria-hidden="true"></span>
        </button>
        <ng-container *ngIf="mode === 'setup'; else saveActions">
          <button class="btn btn--primary" type="button" (click)="continueToWorkspace()">
            <span class="icon icon-16 icon--check" aria-hidden="true"></span>
            <span>Kontynuuj</span>
          </button>
        </ng-container>
        <ng-template #saveActions>
          <button class="btn btn--primary" type="button" (click)="onSaveScene()">
            <span class="icon icon-16 icon--save" aria-hidden="true"></span>
            <span>Zapisz</span>
          </button>
        </ng-template>
      </div>
    </div>
  </section>

  <ng-container *ngIf="!loadingProject && !loadError; else loadingOrError">
        <ng-container *ngIf="mode === 'setup'; else workspaceTpl">
      <div class="editor-layout">
        <aside class="editor-sidebar">
          <button class="editor-sidebar__item" type="button" [class.editor-sidebar__item--active]="setupTab === 'cake'" (click)="selectSetupTab('cake')">
            <span class="icon icon-24 icon--cake" aria-hidden="true"></span>
            <span>Tort</span>
          </button>
          <button class="editor-sidebar__item" type="button" [class.editor-sidebar__item--active]="setupTab === 'texture'" (click)="selectSetupTab('texture')">
            <span class="icon icon-24 icon--texture" aria-hidden="true"></span>
            <span>Textura</span>
          </button>
          <button class="editor-sidebar__item" type="button" [class.editor-sidebar__item--active]="setupTab === 'color'" (click)="selectSetupTab('color')">
            <span class="icon icon-24 icon--color" aria-hidden="true"></span>
            <span>Kolor</span>
          </button>
          <button class="editor-sidebar__item" type="button" [class.editor-sidebar__item--active]="setupTab === 'glaze'" (click)="selectSetupTab('glaze')">
            <span class="icon icon-24 icon--drip" aria-hidden="true"></span>
            <span>Polewa</span>
          </button>

          <div class="editor-sidebar__bottom">
            <button class="btn btn--ghost icon-only" type="button">
              <span class="icon icon-16 icon--settings" aria-hidden="true"></span>
            </button>
          </div>
        </aside>

        <section class="editor-panel">
          <ng-container [ngSwitch]="setupTab">
            <div *ngSwitchCase="'cake'" class="editor-panel__section">
              <div class="panel-block">
                <div class="panel-block__title">Rozmiar</div>
                <div class="toggle-tab">
                  <button class="toggle-tab__item" [class.toggle-tab__item--active]="selectedCakeSize === 'small'" type="button" (click)="selectCakeSize('small')">Mały</button>
                  <button class="toggle-tab__item" [class.toggle-tab__item--active]="selectedCakeSize === 'medium'" type="button" (click)="selectCakeSize('medium')">Średni</button>
                  <button class="toggle-tab__item" [class.toggle-tab__item--active]="selectedCakeSize === 'large'" type="button" (click)="selectCakeSize('large')">Duży</button>
                </div>
              </div>

              <div class="panel-block">
                <div class="panel-block__title">Kształt</div>
                <div class="toggle-tab">
                  <button class="toggle-tab__item" [class.toggle-tab__item--active]="selectedShape === 'cuboid'" type="button" (click)="selectShape('cuboid')">Prostokątny</button>
                  <button class="toggle-tab__item" [class.toggle-tab__item--active]="selectedShape === 'cylinder'" type="button" (click)="selectShape('cylinder')">Okrągły</button>
                </div>
              </div>

              <div class="panel-block">
                <div class="panel-block__title">Liczba pięter</div>
                <div class="toggle-tab">
                  <button class="toggle-tab__item" [class.toggle-tab__item--active]="selectedLayers === 1" type="button" (click)="selectLayers(1)">1</button>
                  <button class="toggle-tab__item" [class.toggle-tab__item--active]="selectedLayers === 2" type="button" (click)="selectLayers(2)">2</button>
                  <button class="toggle-tab__item" [class.toggle-tab__item--active]="selectedLayers === 3" type="button" (click)="selectLayers(3)">3</button>
                </div>
              </div>
            </div>

            <div *ngSwitchCase="'texture'" class="editor-panel__section">
              <div class="panel-block__title">Textury tortu</div>
              <div class="texture-grid">
                <button
                  *ngFor="let texture of setupTextures"
                  type="button"
                  class="texture-card"
                  [class.texture-card--active]="selectedTextureId === texture.id"
                  (click)="selectTexture(texture.id)"
                >
                  <div class="texture-card__header">
                    <span class="icon icon-24 icon--file" aria-hidden="true"></span>
                    <div class="texture-card__name">{{ texture.name }}</div>
                  </div>
                  <div class="texture-card__preview" [style.background-image]="'url(' + texture.preview + ')'" aria-hidden="true"></div>
                </button>
              </div>
            </div>

            <div *ngSwitchCase="'color'" class="editor-panel__section">
              <div class="panel-block">
                <div class="color-row">
                  <span class="color-row__label">Kolor tortu</span>
                  <div class="color-row__input">
                    <span class="icon icon-16 icon--hash" aria-hidden="true"></span>
                    <input
                      type="text"
                      [ngModel]="primaryColor"
                      (ngModelChange)="setCakeColor($event)"
                    />
                  </div>
                  <div class="color-swatch" [style.background]="primaryColor"></div>
                </div>
              </div>

              <div class="panel-block">
                <div class="functions-row">
                  <div class="section-header__title">Gradient</div>
                  <button class="btn-toggle" type="button" (click)="toggleGradient(!gradientEnabled)">
                    <span class="icon icon-16 icon--power" aria-hidden="true"></span>
                  </button>
                </div>

                <div class="toggle-tab">
                  <button class="toggle-tab__item" [class.toggle-tab__item--active]="gradientDirection === 'top-bottom'" type="button" (click)="setGradientDirection('top-bottom')">Góra → dół</button>
                  <button class="toggle-tab__item" [class.toggle-tab__item--active]="gradientDirection === 'bottom-top'" type="button" (click)="setGradientDirection('bottom-top')">Dół → góra</button>
                </div>

                <div class="color-row">
                  <span class="color-row__label">Pierwszy kolor</span>
                  <div class="color-row__input">
                    <span class="icon icon-16 icon--hash" aria-hidden="true"></span>
                    <input type="text" [ngModel]="gradientFirst" (ngModelChange)="setGradientColor('first', $event)" />
                  </div>
                  <div class="color-swatch" [style.background]="gradientFirst"></div>
                </div>

                <div class="color-row">
                  <span class="color-row__label">Drugi kolor</span>
                  <div class="color-row__input">
                    <span class="icon icon-16 icon--hash" aria-hidden="true"></span>
                    <input type="text" [ngModel]="gradientSecond" (ngModelChange)="setGradientColor('second', $event)" />
                  </div>
                  <div class="color-swatch" [style.background]="gradientSecond"></div>
                </div>
              </div>
            </div>

            <div *ngSwitchCase="'glaze'" class="editor-panel__section">
              <div class="panel-block">
                <div class="functions-row">
                  <div class="section-header__title">Polewa</div>
                  <button class="btn-toggle" type="button" (click)="toggleGlaze(!glazeEnabled)">
                    <span class="icon icon-16 icon--power" aria-hidden="true"></span>
                  </button>
                </div>

                <div class="color-row">
                  <span class="color-row__label">Kolor polewy</span>
                  <div class="color-row__input">
                    <span class="icon icon-16 icon--hash" aria-hidden="true"></span>
                    <input type="text" [ngModel]="options.glaze_color" (ngModelChange)="setGlazeColor($event)" />
                  </div>
                  <div class="color-swatch" [style.background]="options.glaze_color"></div>
                </div>

                <div class="toggle-tab">
                  <button class="toggle-tab__item" [class.toggle-tab__item--active]="glazeMode === 'taffla'" type="button" (click)="setGlazeMode('taffla')">Tafla</button>
                  <button class="toggle-tab__item" [class.toggle-tab__item--active]="glazeMode === 'plain'" type="button" (click)="setGlazeMode('plain')">Bez tafli</button>
                </div>
              </div>

              <div class="panel-block">
                <div class="functions-row">
                  <div class="section-header__title">Opłatek</div>
                  <button class="btn-toggle" type="button" (click)="toggleWafer(!waferEnabled)">
                    <span class="icon icon-16 icon--power" aria-hidden="true"></span>
                  </button>
                </div>

                <div class="functions-row">
                  <span class="color-row__label">Wybierz obraz</span>
                  <label class="file-input" [class.file-input--disabled]="!waferEnabled">
                    <input type="file" (change)="onWaferFileSelected($event)" [disabled]="!waferEnabled" hidden />
                    <span>Wybierz plik</span>
                  </label>
                </div>

                <div class="color-row">
                  <span class="color-row__label">Lights color</span>
                  <div class="color-row__input">
                    <span class="icon icon-16 icon--hash" aria-hidden="true"></span>
                    <input type="text" [ngModel]="options.glaze_color" (ngModelChange)="setWaferColor($event)" />
                  </div>
                  <div class="color-swatch" [style.background]="options.glaze_color"></div>
                </div>
              </div>
            </div>
          </ng-container>
        </section>

        <section class="editor-viewport">
          <div class="editor-viewport__inner">
            <div #canvasContainer class="canvas-container"></div>
          </div>
        </section>
      </div>
    </ng-container>

    <ng-template #workspaceTpl>
      <div class="workspace-layout">
        <aside class="workspace-sidebar">
          <div class="workspace-sidebar__header">
            <div class="section-header">
              <span class="icon section-header__icon icon--scene" aria-hidden="true"></span>
              <h2 class="section-header__title">Scene</h2>
            </div>
            <button class="btn btn--ghost icon-only" type="button" (click)="onSaveScene()" aria-label="Dodaj element">
              <span class="icon icon-16 icon--plus" aria-hidden="true"></span>
            </button>
          </div>

          <div class="scene-tree">
            <app-scene-outline></app-scene-outline>
          </div>

          <button class="btn btn--primary workspace-sidebar__save" type="button" (click)="onSaveScene()">
            <span class="icon icon-16 icon--save" aria-hidden="true"></span>
            <span>Zapisz</span>
          </button>
        </aside>

        <ng-container *ngIf="workspaceTab === 'decor'; else madeCakesTpl">
          <section class="workspace-viewport">
            <div class="workspace-viewport__inner">
              <div class="workspace-toolbar">
                <button
                  class="workspace-toolbar__btn"
                  type="button"
                  [class.workspace-toolbar__btn--active]="activeWorkspacePanel === 'decor'"
                  (click)="openDecorPanel()"
                  [attr.aria-pressed]="activeWorkspacePanel === 'decor'"
                  title="Dekoracje"
                >
                  <span class="icon icon-16 icon--select" aria-hidden="true"></span>
                </button>
                <button
                  class="workspace-toolbar__btn"
                  type="button"
                  [class.workspace-toolbar__btn--active]="activeWorkspacePanel === 'paint'"
                  (click)="openPaintPanel()"
                  [attr.aria-pressed]="activeWorkspacePanel === 'paint'"
                  title="Tryb malowania"
                >
                  <span class="icon icon-16 icon--grid" aria-hidden="true"></span>
                </button>
                <div class="workspace-toolbar__divider"></div>
                <button
                  class="workspace-toolbar__btn"
                  type="button"
                  [class.workspace-toolbar__btn--active]="transformMode === 'translate'"
                  (click)="onTransformModeChange('translate')"
                  [attr.aria-pressed]="transformMode === 'translate'"
                  title="Przesuwanie"
                >
                  <span class="icon icon-16 icon--move" aria-hidden="true"></span>
                </button>
                <button
                  class="workspace-toolbar__btn"
                  type="button"
                  [class.workspace-toolbar__btn--active]="transformMode === 'rotate'"
                  (click)="onTransformModeChange('rotate')"
                  [attr.aria-pressed]="transformMode === 'rotate'"
                  title="Obracanie"
                >
                  <span class="icon icon-16 icon--rotate" aria-hidden="true"></span>
                </button>
                <button
                  class="workspace-toolbar__btn"
                  type="button"
                  [class.workspace-toolbar__btn--active]="transformMode === 'scale'"
                  (click)="onTransformModeChange('scale')"
                  [attr.aria-pressed]="transformMode === 'scale'"
                  title="Skalowanie"
                >
                  <span class="icon icon-16 icon--scale" aria-hidden="true"></span>
                </button>
              </div>

              <div #canvasContainer class="workspace-viewport__canvas"></div>

              <div class="viewport-bottom-bar">
                <div class="viewport-camera">
                  <button class="btn btn--ghost icon-only" type="button" title="Orbit">
                    <span class="icon icon-16 icon--camera-orbit" aria-hidden="true"></span>
                  </button>
                  <button class="btn btn--ghost icon-only" type="button" title="Front">
                    <span class="icon icon-16 icon--camera-front" aria-hidden="true"></span>
                  </button>
                </div>
                <div class="select-row select-row--compact">
                  <div class="select-row__input">
                    <span>Perspective</span>
                    <span class="icon icon-12 icon--caret" aria-hidden="true"></span>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <section class="editor-panel editor-panel--painting" *ngIf="activeWorkspacePanel === 'decor'">
            <app-decorations-panel
              [decorationsService]="decorationsService"
              [options]="options"
              [validationSummary]="validationSummary"
              [validationIssues]="validationIssues"
              [pendingActionLabel]="pendingValidationLabel"
              [authorModeEnabled]="authorModeEnabled"
              (addDecoration)="onAddDecoration($event)"
              (validateDecorations)="onValidateDecorations()"
              (transformModeChange)="onTransformModeChange($event)"
              (proceedDespiteWarnings)="onProceedDespiteWarnings()"
            ></app-decorations-panel>
          </section>

          <section class="editor-panel editor-panel--painting" *ngIf="activeWorkspacePanel === 'paint'">
            <app-paint-panel
              [paintService]="paintService"
              [decorationsService]="decorationsService"
              (paintModeChange)="onTogglePaintMode($event)"
              (brushChange)="onBrushChanged($event)"
            ></app-paint-panel>
          </section>
        </ng-container>

        <ng-template #madeCakesTpl>
          <section class="workspace-viewport workspace-viewport--gallery">
            <div class="ready-cakes-grid">
              <article class="ready-cake" *ngFor="let preset of madeCakesPresets">
                <div class="ready-cake__preview" [style.background-image]="'url(' + preset.preview + ')'" aria-hidden="true"></div>
                <div class="ready-cake__body">
                  <div class="ready-cake__title">{{ preset.name }}</div>
                  <div class="ready-cake__subtitle">{{ preset.subtitle }}</div>
                  <div class="ready-cake__actions">
                    <button class="btn btn--ghost btn--small" type="button">Wybierz</button>
                    <button class="btn btn--primary btn--small" type="button">Modyfikuj</button>
                  </div>
                </div>
              </article>
            </div>
          </section>
        </ng-template>
      </div>
    </ng-template>
  </ng-container>

  <ng-template #loadingOrError>
    <div class="editor-loader" *ngIf="loadingProject">Wczytywanie projektu...</div>
    <div class="editor-error" *ngIf="!loadingProject && loadError">{{ loadError }}</div>
  </ng-template>
</div>
