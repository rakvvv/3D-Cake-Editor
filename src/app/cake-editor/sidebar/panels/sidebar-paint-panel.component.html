<div class="panel-card">
  <div class="panel-block__header">
    <div class="panel-block__title">Tryby malowania</div>
  </div>
  <div class="toggle-tab">
    <button class="toggle-tab__item" [class.toggle-tab__item--active]="mode === 'decor3d'" type="button" (click)="selectMode('decor3d')">
      Dekoracje 3D
    </button>
    <button class="toggle-tab__item" [class.toggle-tab__item--active]="mode === 'brush'" type="button" (click)="selectMode('brush')">
      Smugi
    </button>
    <button class="toggle-tab__item" [class.toggle-tab__item--active]="mode === 'extruder'" type="button" (click)="selectMode('extruder')">
      Ekstruder
    </button>
    <button class="toggle-tab__item" [class.toggle-tab__item--active]="mode === 'sprinkles'" type="button" (click)="selectMode('sprinkles')">
      Posypka
    </button>
  </div>
</div>

<div class="panel-card" *ngIf="mode === 'decor3d'">
  <div class="panel-block__title">Pędzel dekoracji</div>
  <div class="input">
    <input type="text" [ngModel]="brushId" (ngModelChange)="onBrushIdChange($event)" placeholder="Nazwa modelu" />
  </div>
</div>

<div class="panel-card" *ngIf="mode === 'brush' || mode === 'extruder'">
  <div class="panel-block__header">
    <div class="panel-block__title">Kolor kremu</div>
  </div>
  <div class="color-row">
    <span class="color-row__label">Kolor</span>
    <div class="color-row__input">
      <input type="color" [ngModel]="paintColor" (ngModelChange)="onColorChange($event)" />
      <input type="text" [ngModel]="paintColor" (ngModelChange)="onColorChange($event)" />
    </div>
    <div class="color-swatch" [style.background]="paintColor"></div>
  </div>
  <div class="slider-row">
    <span class="slider-row__label">Rozmiar</span>
    <input type="range" min="0.01" max="0.2" step="0.005" [ngModel]="penSize" (ngModelChange)="onSizeChange($event)" class="slider-row__range" />
    <div class="slider-row__value">{{ penSize | number: '1.2-3' }}</div>
  </div>
  <div class="slider-row">
    <span class="slider-row__label">Grubość</span>
    <input type="range" min="0.01" max="0.1" step="0.002" [ngModel]="penThickness" (ngModelChange)="onThicknessChange($event)" class="slider-row__range" />
    <div class="slider-row__value">{{ penThickness | number: '1.2-3' }}</div>
  </div>
</div>

<div class="panel-card" *ngIf="mode === 'sprinkles'">
  <div class="panel-block__title">Posypka</div>
  <p class="panel-hint">Użyj kliknięć, aby rozmieścić drobne elementy na powierzchni.</p>
</div>
