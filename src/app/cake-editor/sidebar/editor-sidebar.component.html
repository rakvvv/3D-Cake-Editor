<section class="workspace-panel">
  <div class="workspace-panel__content" [ngSwitch]="activePanel">
    <app-sidebar-decorations-panel
      *ngSwitchCase="'decorations'"
      [layerCount]="options.layers || 1"
      (addDecoration)="onAddDecoration($event)"
    ></app-sidebar-decorations-panel>

    <app-sidebar-presets-panel
      *ngSwitchCase="'presets'"
      [presets]="presets"
      (applyCakePreset)="onPresetApply($event)"
    ></app-sidebar-presets-panel>

    <app-sidebar-paint-panel
      *ngSwitchCase="'paint'"
      [mode]="paintingMode"
      [paintColor]="paintColor"
      [penSize]="penSize"
      [penThickness]="penThickness"
      [penOpacity]="penOpacity"
      [brushId]="paintBrushId"
      [paintingEnabled]="paintingPowerEnabled"
      [layerCount]="options.layers || 1"
      (paintModeChange)="onPaintModeChange($event)"
      (brushChange)="onBrushChange($event)"
      (paintingPowerChange)="paintingPowerChange.emit($event)"
    ></app-sidebar-paint-panel>

    <div *ngSwitchDefault class="workspace-panel__placeholder">
      Wybierz sekcję z paska narzędzi obok sceny.
    </div>
  </div>
</section>
