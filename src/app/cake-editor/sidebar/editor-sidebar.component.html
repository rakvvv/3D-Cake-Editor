<section class="workspace-panel">
  <header class="workspace-panel__header">
    <div class="workspace-panel__title">Panel boczny</div>
    <div class="workspace-panel__actions">
      <button class="btn btn--ghost icon-only" type="button" (click)="saveScene.emit()" title="Zapisz">
        <span class="icon-16" aria-hidden="true">💾</span>
      </button>
    </div>
  </header>

  <nav class="panel-nav" aria-label="Sekcje panelu">
    <button
      class="panel-nav__item"
      [class.panel-nav__item--active]="activePanel === 'layers'"
      type="button"
      (click)="onPanelSelect('layers')"
    >
      Warstwy
    </button>
    <button
      class="panel-nav__item"
      [class.panel-nav__item--active]="activePanel === 'textures'"
      type="button"
      (click)="onPanelSelect('textures')"
    >
      Tekstury
    </button>
    <button
      class="panel-nav__item"
      [class.panel-nav__item--active]="activePanel === 'decorations'"
      type="button"
      (click)="onPanelSelect('decorations')"
    >
      Dekoracje
    </button>
    <button
      class="panel-nav__item"
      [class.panel-nav__item--active]="activePanel === 'presets'"
      type="button"
      (click)="onPanelSelect('presets')"
    >
      Presety
    </button>
    <button
      class="panel-nav__item"
      [class.panel-nav__item--active]="activePanel === 'paint'"
      type="button"
      (click)="onPanelSelect('paint')"
    >
      Malowanie
    </button>
    <button
      class="panel-nav__item"
      [class.panel-nav__item--active]="activePanel === 'export'"
      type="button"
      (click)="onPanelSelect('export')"
    >
      Eksport
    </button>
  </nav>

  <div class="workspace-panel__content" [ngSwitch]="activePanel">
    <app-sidebar-layers-panel
      *ngSwitchCase="'layers'"
      [options]="options"
      (optionsChange)="onOptionsChange($event)"
    ></app-sidebar-layers-panel>

    <app-sidebar-textures-panel
      *ngSwitchCase="'textures'"
      [options]="options"
      [textures]="textureOptions"
      (optionsChange)="onOptionsChange($event)"
    ></app-sidebar-textures-panel>

    <app-sidebar-decorations-panel
      *ngSwitchCase="'decorations'"
      [decorations]="decorations"
      [layerCount]="options?.layers || 1"
      (addDecoration)="onAddDecoration($event)"
    ></app-sidebar-decorations-panel>

    <app-sidebar-presets-panel
      *ngSwitchCase="'presets'"
      [presets]="presets"
      (applyCakePreset)="onPresetApply($event)"
    ></app-sidebar-presets-panel>

    <app-sidebar-paint-panel
      *ngSwitchCase="'paint'"
      [mode]="paintingMode"
      [paintColor]="paintColor"
      [penSize]="penSize"
      [penThickness]="penThickness"
      [brushId]="paintBrushId"
      (paintModeChange)="onPaintModeChange($event)"
      (brushChange)="onBrushChange($event)"
    ></app-sidebar-paint-panel>

    <app-sidebar-export-panel
      *ngSwitchCase="'export'"
      [validationSummary]="validationSummary"
      [validationIssues]="validationIssues"
      [pendingValidationLabel]="pendingValidationLabel"
      (validateDecorations)="validateDecorations.emit()"
      (proceedDespiteWarnings)="proceedDespiteWarnings.emit()"
      (saveScene)="saveScene.emit()"
      (exportObj)="exportObj.emit()"
      (exportStl)="exportStl.emit()"
      (exportGltf)="exportGltf.emit()"
    ></app-sidebar-export-panel>
  </div>
</section>
