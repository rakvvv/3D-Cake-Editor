<div class="workspace-layout">
  <aside class="workspace-sidebar">
    <div class="workspace-sidebar__header">
      <div class="section-header">
        <span class="section-header__icon" aria-hidden="true">📂</span>
        <h2 class="section-header__title">Scene</h2>
      </div>
      <button class="btn btn--ghost icon-only" type="button" (click)="saveScene.emit()" title="Zapisz">
        <span class="icon-16" aria-hidden="true">💾</span>
      </button>
    </div>
    <div class="scene-tree">
      <app-scene-outline></app-scene-outline>
    </div>
    <button class="btn btn--primary workspace-sidebar__save" type="button" (click)="saveScene.emit()">
      <span class="icon-16" aria-hidden="true">💾</span>
      <span>Zapisz</span>
    </button>
  </aside>

  <section class="workspace-viewport">
    <div class="workspace-viewport__inner">
      <app-workspace-toolbar
        [activePanel]="activePanel"
        (decorationsRequested)="focusDecorations()"
        (paintRequested)="focusPaint()"
        (transformModeChange)="transformModeChange.emit($event)"
      ></app-workspace-toolbar>

      <app-workspace-viewport (canvasReady)="handleCanvasReady($event)"></app-workspace-viewport>
    </div>
  </section>

  <aside class="workspace-panel">
    <app-editor-sidebar
      [options]="options"
      [validationSummary]="validationSummary"
      [validationIssues]="validationIssues"
      [pendingValidationLabel]="pendingValidationLabel"
      [authorModeEnabled]="authorModeEnabled"
      (optionsChange)="optionsChange.emit($event)"
      (addDecoration)="addDecoration.emit($event)"
      (validateDecorations)="validateDecorations.emit()"
      (saveScene)="saveScene.emit()"
      (applyCakePreset)="applyCakePreset.emit($event)"
      (proceedDespiteWarnings)="proceedDespiteWarnings.emit()"
      (transformModeChange)="transformModeChange.emit($event)"
      (exportObj)="exportObj.emit()"
      (exportStl)="exportStl.emit()"
      (exportGltf)="exportGltf.emit()"
      (screenshot)="screenshot.emit()"
      (brushChange)="brushChange.emit($event)"
      (paintModeChange)="paintModeChange.emit($event)"
    ></app-editor-sidebar>
  </aside>
</div>
