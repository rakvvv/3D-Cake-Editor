<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Decoration Thumbnail Renderer</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      font-family: Arial, sans-serif;
      color: #222;
    }

    #renderer-container {
      width: 256px;
      height: 256px;
      position: relative;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
      border-radius: 12px;
      overflow: hidden;
    }

    #error {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fce8e6;
      color: #b00020;
      font-size: 14px;
      text-align: center;
      padding: 12px;
    }
  </style>
</head>
<body>
<div id="renderer-container"></div>
<div id="error" hidden>Failed to load model</div>
<script type="module">
  import * as THREE from 'https://unpkg.com/three@0.174.0/build/three.module.js';
  import { GLTFLoader } from 'https://unpkg.com/three@0.174.0/examples/jsm/loaders/GLTFLoader.js';
  import { KTX2Loader } from 'https://unpkg.com/three@0.174.0/examples/jsm/loaders/KTX2Loader.js';
  import { MeshoptDecoder } from 'https://unpkg.com/three@0.174.0/examples/jsm/libs/meshopt_decoder.module.js';

  const params = new URLSearchParams(window.location.search);
  const modelUrl = params.get('model');
  const container = document.getElementById('renderer-container');
  const errorEl = document.getElementById('error');
  const targetSize = 256;

  if (!modelUrl) {
    errorEl.textContent = 'Missing model query param';
    errorEl.hidden = false;
    window.__THUMB_READY__ = false;
    throw new Error('Missing model param');
  }

  const scene = new THREE.Scene();
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(targetSize, targetSize);
  renderer.setPixelRatio(1);
  renderer.setClearColor(0xf8f8f8, 1);
  container.appendChild(renderer.domElement);

  const camera = new THREE.PerspectiveCamera(35, 1, 0.1, 2000);
  camera.position.set(3, 3.4, 3.4);

  const hemi = new THREE.HemisphereLight(0xffffff, 0x8d8d8d, 1.0);
  scene.add(hemi);
  const dir = new THREE.DirectionalLight(0xffffff, 1.1);
  dir.position.set(5, 10, 5);
  dir.castShadow = true;
  scene.add(dir);

  const loader = new GLTFLoader();
  const ktx2Loader = new KTX2Loader();
  ktx2Loader.setTranscoderPath('/assets/ktx2/');
  ktx2Loader.detectSupport(renderer);
  loader.setKTX2Loader(ktx2Loader);
  loader.setMeshoptDecoder(MeshoptDecoder);

  function fitCameraToObject(object) {
    const boundingBox = new THREE.Box3().setFromObject(object);
    const size = boundingBox.getSize(new THREE.Vector3());
    const center = boundingBox.getCenter(new THREE.Vector3());

    const maxSize = Math.max(size.x, size.y, size.z);
    const radius = maxSize * 0.5;
    const fov = THREE.MathUtils.degToRad(camera.fov);
    const distance = radius / Math.sin(fov / 2) + maxSize * 0.6;

    const direction = new THREE.Vector3(1.2, 1, 1.4).normalize();
    camera.position.copy(center.clone().add(direction.multiplyScalar(distance)));
    camera.lookAt(center);
  }

  function markReady() {
    window.__THUMB_READY__ = true;
  }

  loader.load(modelUrl, (gltf) => {
    const root = gltf.scene || gltf.scenes[0];
    scene.add(root);
    fitCameraToObject(root);
    renderer.render(scene, camera);
    markReady();
  }, undefined, (error) => {
    console.error('Failed to load model', error);
    errorEl.hidden = false;
    markReady();
  });
</script>
</body>
</html>
