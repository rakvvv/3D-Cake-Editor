<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Decoration Thumbnail Renderer</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      font-family: Arial, sans-serif;
      color: #222;
    }

    #renderer-container {
      width: 256px;
      height: 256px;
      position: relative;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
      border-radius: 12px;
      overflow: hidden;
    }

    #error {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fce8e6;
      color: #b00020;
      font-size: 14px;
      text-align: center;
      padding: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.2;
    }
  </style>
</head>
<body>
<div id="renderer-container"></div>
<script type="importmap">
  {
    "imports": {
      "three": "/node_modules/three/build/three.module.js",
      "three/addons/": "/node_modules/three/examples/jsm/"
    }
  }
</script>
<script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { KTX2Loader } from 'three/addons/loaders/KTX2Loader.js';
  import { MeshoptDecoder } from 'three/addons/libs/meshopt_decoder.module.js';
  import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

  window.__THUMB_READY__ = false;
  window.__THUMB_OK__ = false;
  const params = new URLSearchParams(window.location.search);
  const modelUrl = params.get('model');
  const theme = (params.get('theme') || 'light').toLowerCase() === 'dark' ? 'dark' : 'light';
  const container = document.getElementById('renderer-container');
  const errorEl = document.getElementById('error');
  const targetSize = 256;
  const backgroundColor = theme === 'dark' ? 0x1b1b1f : 0xf0f0f0;

  console.log('THUMB RENDERER theme=', theme, 'background=', backgroundColor);

  if (!modelUrl) {
    errorEl.textContent = 'Missing model query param';
    errorEl.hidden = false;
    window.__THUMB_READY__ = false;
    throw new Error('Missing model param');
  }

  const scene = new THREE.Scene();
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(targetSize, targetSize);
  renderer.setPixelRatio(1);
  renderer.setClearColor(backgroundColor, 1);
  container.appendChild(renderer.domElement);

  const camera = new THREE.PerspectiveCamera(35, 1, 0.1, 2000);
  camera.position.set(3, 3.4, 3.4);

  const hemi = new THREE.HemisphereLight(0xffffff, 0x8d8d8d, 1.0);
  scene.add(hemi);
  const dir = new THREE.DirectionalLight(0xffffff, 1.1);
  dir.position.set(5, 10, 5);
  dir.castShadow = true;
  scene.add(dir);

  const loader = new GLTFLoader();
  const dracoLoader = new DRACOLoader();
  dracoLoader.setDecoderPath('/node_modules/three/examples/jsm/libs/draco/');
  loader.setDRACOLoader(dracoLoader);
  const ktx2Loader = new KTX2Loader();
  ktx2Loader.setTranscoderPath('/assets/ktx2/');
  ktx2Loader.detectSupport(renderer);
  loader.setKTX2Loader(ktx2Loader);
  loader.setMeshoptDecoder(MeshoptDecoder);

  function fitCameraToObject(object) {
    object.updateWorldMatrix(true, true);

    const box = new THREE.Box3().setFromObject(object);
    const center = box.getCenter(new THREE.Vector3());
    const sphere = box.getBoundingSphere(new THREE.Sphere());

    object.position.sub(center);
    object.updateWorldMatrix(true, true);

    const radius = Math.max(sphere.radius, 1e-6);
    const fov = THREE.MathUtils.degToRad(camera.fov);

    const distance = radius / Math.sin(fov / 2);

    const dir = new THREE.Vector3(1.2, 1.0, 1.4).normalize();
    camera.position.copy(dir.multiplyScalar(distance * 1.25)); // margines
    camera.near = distance / 100;
    camera.far = distance * 100;
    camera.updateProjectionMatrix();
    camera.lookAt(0, 0, 0);
  }

  console.log('Attempting to load model from:', modelUrl);
  loader.load(
    modelUrl,
    (gltf) => {
      console.log('Model loaded successfully');
      const root = new THREE.Group();
      (gltf.scenes?.length ? gltf.scenes : [gltf.scene]).forEach(s => s && root.add(s));
      scene.add(root);
      root.updateWorldMatrix(true, true);
      root.traverse((o) => {
        if (o.isMesh && o.geometry) {
          if (!o.geometry.boundingBox) o.geometry.computeBoundingBox();
          if (!o.geometry.boundingSphere) o.geometry.computeBoundingSphere();
          o.frustumCulled = false;
        }
      });
      scene.add(root);
      fitCameraToObject(root);

      renderer.render(scene, camera);
      requestAnimationFrame(() => {
        renderer.render(scene, camera);
        requestAnimationFrame(() => {
          window.__THUMB_OK__ = true;
          window.__THUMB_READY__ = true;
        });
      });
    },
    (progress) => {
      console.log(`Loading progress: ${(progress.loaded / progress.total * 100).toFixed(2)}%`);
    },
    (error) => {
      console.error('FULL ERROR OBJECT:', error);
      errorEl.hidden = false;

      if (error.target && error.target.status) {
        errorEl.textContent = `Network Error: ${error.target.status} ${error.target.statusText}`;
      } else {
        errorEl.textContent = `Load Error: ${error.message || 'Check browser console'}`;
      }
      window.__THUMB_READY__ = true;
    }
  );
</script>
</body>
</html>
