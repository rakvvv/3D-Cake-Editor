<div class="auth-layout">
  <div class="auth-card">
    <h2 class="auth-title">Ustaw nowe hasło</h2>

    <div *ngIf="message" class="auth-success">
      <p>{{ message }}</p>
      <p class="auth-link"><a routerLink="/login">Przejdź do logowania</a></p>
    </div>

    <form *ngIf="!message && token" (ngSubmit)="onSubmit()" class="auth-form">
      <label>
        Nowe hasło
        <input type="password" name="password" [(ngModel)]="password" required minlength="8" />
      </label>
      <label>
        Powtórz nowe hasło
        <input type="password" name="confirmPassword" [(ngModel)]="confirmPassword" required minlength="8" />
      </label>
      <p *ngIf="password && confirmPassword && password !== confirmPassword" class="auth-field-error">
        Hasła nie są identyczne
      </p>
      <button type="submit" [disabled]="!password || !confirmPassword || password !== confirmPassword">
        Zmień hasło
      </button>
      <p *ngIf="error" class="auth-error">{{ error }}</p>
    </form>

    <div *ngIf="!token" class="auth-form">
      <p class="auth-error">{{ error }}</p>
      <p class="auth-link"><a routerLink="/forgot-password">Poproś o nowy link</a></p>
    </div>
  </div>
</div>
