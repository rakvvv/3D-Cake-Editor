<div class="auth-layout">
  <div class="auth-card">
    <h2 class="auth-title">Zapomniałeś hasła?</h2>

    <div *ngIf="message" class="auth-success">
      <p>{{ message }}</p>
      <p class="auth-link"><a routerLink="/login">Powrót do logowania</a></p>
    </div>

    <form *ngIf="!message" (ngSubmit)="onSubmit()" class="auth-form">
      <p class="auth-hint">Podaj swój adres email, a wyślemy Ci link do resetu hasła.</p>
      <label>
        Email
        <input type="email" name="email" [(ngModel)]="email" required />
      </label>
      <button type="submit" [disabled]="!email">Wyślij link</button>
      <p class="auth-link"><a routerLink="/login">Powrót do logowania</a></p>
      <p *ngIf="error" class="auth-error">{{ error }}</p>
    </form>
  </div>
</div>
