spring:
  application:
    name: cake-editor-backend

server:
  port: 8080

app:
  storage:
    base-path: data/scenes
  cors:
    allowed-origins:
      - http://localhost:4200
      - http://localhost:4000
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
