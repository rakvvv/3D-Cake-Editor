spring:
  application:
    name: cake-editor-backend
  datasource:
    url: jdbc:h2:file:./data/h2db
    driverClassName: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

app:
  storage:
    base-path: data/scenes
  cors:
    allowed-origins:
      - http://localhost:4200
      - http://localhost:4000
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
  jwt:
    secret: ${APP_JWT_SECRET:change-me}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:1800000}
