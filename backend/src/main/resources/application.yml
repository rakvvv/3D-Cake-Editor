spring:
  application:
    name: cake-editor-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cake_editor}
    driverClassName: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:cake_editor}
    password: ${SPRING_DATASOURCE_PASSWORD:devpass}
    hikari:
      auto-commit: false
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

management:
  endpoints:
    web:
      exposure:
        include: health

server:
  port: 8080
  forward-headers-strategy: framework
  error:
    include-message: always

app:
  storage:
    base-path: data/scenes
  cors:
    allowed-origins:
      - http://localhost:4200
      - http://localhost:4000
      - http://localhost:8080
      - http://127.0.0.1:8080
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
  jwt:
    secret: ${APP_JWT_SECRET:change-me}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:1800000}
  mail:
    from: ${APP_MAIL_FROM:noreply@cake-editor.local}
    base-url: ${APP_BASE_URL:http://localhost:4200}
