spring:
  application:
    name: cake-editor-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cake_editor}
    driverClassName: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:cake_editor}
    password: ${SPRING_DATASOURCE_PASSWORD:devpass}
    hikari:
      auto-commit: false
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health

server:
  port: 8080

app:
  storage:
    base-path: data/scenes
  cors:
    allowed-origins:
      - http://localhost:4200
      - http://localhost:4000
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
  jwt:
    secret: ${APP_JWT_SECRET:change-me}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:1800000}
